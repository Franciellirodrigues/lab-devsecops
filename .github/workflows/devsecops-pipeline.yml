name: Pipeline DevSecOps na Pratica

on:
  push:
    branches: [ "main" ]

jobs:
  seguranca_e_build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Codigo
      uses: actions/checkout@v4

    - name: Scanner de Segredos (TruffleHog)
      uses: trufflesecurity/trufflehog@main
      with:
        base: ""
        head: "${{ github.ref_name }}"
        extra_args: --debug --only-verified

    - name: Executar SAST (Semgrep)
      run: |
        pip install semgrep
        semgrep --config=auto .

    - name: Build da Imagem Docker
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-segura:latest .

    - name: Escanear Imagem com Trivy (Sec)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/app-segura:latest'
        format: 'table'
        severity: 'HIGH,CRITICAL'
        exit-code: '0'

    - name: Login no Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push da Imagem Aprovada
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/app-segura:latest